org: devdeepnarayan
app: loanmantratestapi
service: loanmantra-server

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: prod

  httpApi:
    cors:
      allowedOrigins:
        - https://main.d8tu8g8fumigb.amplifyapp.com
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

  environment:
    NODE_ENV: production
    CUSTOMERS_TABLE: Customers
    REQUESTS_TABLE: Requests

  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:Query
        - dynamodb:UpdateItem
      Resource:
        - arn:aws:dynamodb:ap-south-1:*:table/Customers
        - arn:aws:dynamodb:ap-south-1:*:table/Customers/index/*
        - arn:aws:dynamodb:ap-south-1:*:table/Requests
        - arn:aws:dynamodb:ap-south-1:*:table/Requests/index/*

    - Effect: Allow
      Action:
        - ses:SendEmail
        - ses:SendRawEmail
      Resource: "*"

functions:
  api:
    handler: index.handler
    events:
      - httpApi: "*"

resources:
  Resources:
    CustomersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Customers
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: customerId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: customerId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL

    RequestsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Requests
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: requestId
            AttributeType: S
          - AttributeName: customerId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: requestId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: customerId-createdAt-index
            KeySchema:
              - AttributeName: customerId
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
