org: devdeepnarayan
app: loanmantratestapi
service: loanmantra-server

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: prod

  httpApi:
    cors:
      allowedOrigins:
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowedHeaders:
        - Content-Type

  environment:
    NODE_ENV: production
    DYNAMODB_TABLE_NAME: LoanSubmissions

  iamRoleStatements:
    - Effect: "Allow"
      Action:
        - "dynamodb:PutItem"
        - "dynamodb:GetItem"
        - "dynamodb:UpdateItem"
        - "dynamodb:Query"
      Resource: "arn:aws:dynamodb:${self:provider.region}:*:table/LoanSubmissions"

functions:
  api:
    handler: index.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY